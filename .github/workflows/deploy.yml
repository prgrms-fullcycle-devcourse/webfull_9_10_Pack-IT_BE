name: packit Backend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: EC2에 원격 접속하여 무중단 배포 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # 1. 프로젝트 폴더로 이동
            cd ~/packit

            # 2. 깃허브에서 최신 코드 당겨오기
            git pull origin main

            # 3. 패키지 설치 및 타입스크립트 빌드
            pnpm install
            pnpm run build

            # 4. Prisma 클라이언트 생성 (DB 구조 반영)
            npx prisma generate

            # 5. PM2 로 서버 무중단 재시작 (reload 명령어 사용)
            npx pm2 reload ecosystem.config.cjs
